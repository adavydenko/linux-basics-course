# Generated from docs/A1-Glossary/01-Glossary.ru.md.
# Do not edit manually; run scripts/generate-hints-from-glossary.sh.

["Алиас (alias)"]
hint = "собственное короткое имя для команды или цепочки команд, заведённое через alias. Живёт только в текущей сессии оболочки."

["Аргумент команды"]
hint = "значение, которое команда обрабатывает. Например, в cp file.txt /tmp аргументы — это file.txt и /tmp. Не путать с опцией."

["Аутентификация"]
hint = "проверка того, кто именно пытается войти. В Linux чаще всего по паролю или по SSH-ключу."

["Bash (Bourne Again Shell)"]
hint = "самая распространённая оболочка Linux; команда по умолчанию для интерактивной работы в большинстве дистрибутивов."

["BIOS / UEFI"]
hint = "встроенная программа на материнской плате, которая запускается сразу после включения компьютера и передаёт управление загрузчику."

["Блочное устройство (block device)"]
hint = "файл в /dev, представляющий накопитель или раздел. Чтение и запись идут блоками фиксированного размера. Отличается от обычных файлов буквой b в первой колонке ls -l."

["Виртуальная машина (VM)"]
hint = "программная эмуляция отдельного компьютера: VirtualBox, VMware, KVM, multipass. Внутри VM работает полноценная гостевая операционная система."

["Volume Group (VG)"]
hint = "в терминологии LVM группа томов, общий «пул» дискового пространства, собранный из одного или нескольких physical volumes."

["Volume Group, Physical Volume, Logical Volume"]
hint = "три уровня LVM. См. отдельные статьи."

["Gateway (шлюз)"]
hint = "маршрутизатор, на который система отправляет пакеты для сетей, не описанных в её таблице маршрутизации."

["GPT (GUID Partition Table)"]
hint = "современная схема разметки диска, поддерживающая больше четырёх разделов и тома в петабайты. Преемник MBR."

["GID (Group ID)"]
hint = "числовой идентификатор группы. Виден в выводе id, в третьем поле /etc/group."

["GRUB"]
hint = "загрузчик операционной системы. После BIOS/UEFI именно GRUB загружает выбранное ядро Linux."

["Группа (group)"]
hint = "именованный набор пользователей. Используется для разграничения прав на файлы."

["Daemon (демон)"]
hint = "фоновая служба, работающая без терминала. Имена демонов обычно оканчиваются на d: sshd, crond, systemd."

["DAS (Direct Attached Storage)"]
hint = "хранилище, подключённое напрямую к одному хосту (как обычный диск), без сети."

["DHCP"]
hint = "протокол, по которому машина при загрузке автоматически получает IP-адрес, маску, шлюз и DNS-сервер."

["DNS (Domain Name System)"]
hint = "распределённая система, переводящая доменные имена (google.com) в IP-адреса (172.217.0.132)."

["Docker"]
hint = "самая распространённая система контейнеризации. Использует образы и контейнеры (см.)."

["Дескриптор файла (file descriptor, fd)"]
hint = "небольшое целое число, по которому процесс обращается к открытому файлу или потоку. У каждого процесса по умолчанию открыты: 0 — stdin, 1 — stdout, 2 — stderr."

["DPKG (Debian Package Manager)"]
hint = "низкоуровневый пакетный менеджер семейства Debian; работает с файлами .deb. APT — удобная надстройка над ним."

["DROP / REJECT"]
hint = "действия iptables: DROP молча отбрасывает пакет, REJECT отвечает отправителю сообщением «соединение отклонено»."

["ed25519"]
hint = "современный алгоритм генерации SSH-ключей. Короче и быстрее RSA при более высокой криптостойкости."

["Extended партиция (расширенный раздел)"]
hint = "особый тип раздела в схеме MBR, который сам данные не хранит, а служит контейнером для логических разделов. Способ обойти ограничение MBR в 4 «основных» раздела."

["Журнал (journal)"]
hint = "единый журнал событий, который собирает systemd-journald в системах с systemd. Содержит сообщения ядра, всех служб и других источников. Читается через journalctl."

["Загрузчик"]
hint = "программа, которая после BIOS/UEFI загружает ядро операционной системы. В Linux чаще всего это GRUB."

["ICMP"]
hint = "протокол, по которому работают ping и traceroute. Не имеет портов, используется для служебных сообщений сети."

["ip (iproute2)"]
hint = "современный набор команд для работы с сетью в Linux: ip addr, ip link, ip route. Заменил устаревшие ifconfig и route из пакета net-tools."

["iptables"]
hint = "классический инструмент фильтрации пакетов в Linux. На современных дистрибутивах постепенно вытесняется nftables, ufw и firewalld."

["Inode"]
hint = "внутренняя запись файловой системы о файле: его размер, владелец, права, дата изменения и список блоков данных. Имени файла в inode нет — оно лежит в каталоге как ссылка на inode."

["IP-адрес"]
hint = "числовой адрес узла в сети. IPv4 записывается четырьмя числами через точку (192.168.1.10), IPv6 — шестнадцатеричной формой с двоеточиями."

["Кэш"]
hint = "временное хранилище недавно полученных данных, чтобы не запрашивать их повторно. Например, кэш DNS у браузера или у системного DNS-резолвера."

["Командный режим (vi)"]
hint = "основной режим редактора vi, в котором клавиши работают как команды («удалить строку», «перейти в конец»), а не вводят текст."

["Контейнер (container)"]
hint = "изолированный процесс, использующий ядро хоста, но с собственной файловой системой и сетью. Базовая идея Docker и Podman."

["Конвейер (pipe, |)"]
hint = "соединение stdout одной команды со stdin следующей: cat file | grep error | wc -l."

["cgroups (control groups)"]
hint = "механизм ядра, который ограничивает ресурсы (CPU, память, диск) для группы процессов. Используется контейнерами и systemd."

["chmod"]
hint = "команда, меняющая права доступа к файлу (u+x, 750)."

["chown / chgrp"]
hint = "команды смены владельца / группы файла."

["Cron"]
hint = "служба, выполняющая команды по расписанию. Расписание задаётся в crontab."

["Crontab"]
hint = "таблица заданий cron. Команда crontab -e открывает её для текущего пользователя."

["Лог"]
hint = "текстовая запись о событии в системе. Логи живут либо в /var/log/, либо в systemd journal."

["Логический том (LV, Logical Volume)"]
hint = "«виртуальный раздел», нарезанный из Volume Group. Именно на LV создают файловую систему и монтируют его."

["Loopback (lo)"]
hint = "внутренний сетевой интерфейс машины. Адрес 127.0.0.1 всегда указывает на саму машину."

["LVM (Logical Volume Manager)"]
hint = "менеджер логических томов. Прослойка между физическими дисками и файловыми системами, позволяющая собирать тома из нескольких дисков и менять их размер на ходу."

["MAC-адрес"]
hint = "аппаратный адрес сетевого интерфейса, шесть пар шестнадцатеричных цифр: 0e:d5:8a:af:00:de."

["Major / minor number"]
hint = "пара чисел у файлов блочных и символьных устройств. Major указывает на драйвер устройства, minor — на конкретный экземпляр."

["Маска подсети (subnet mask)"]
hint = "определяет, какие IP-адреса считаются «соседями» в той же сети. Записывается либо через точки (255.255.255.0), либо коротко в CIDR (/24)."

["Маршрут (route)"]
hint = "запись в таблице маршрутизации: какие пакеты на какой шлюз отправлять. Маршрут «по умолчанию» (default) применяется ко всему, для чего нет более точного правила."

["Маршрутизатор (router)"]
hint = "устройство, соединяющее разные сети между собой и пересылающее пакеты по маршрутам."

["Межсетевой экран (firewall)"]
hint = "система фильтрации сетевого трафика. В Linux реализуется через iptables, nftables, ufw, firewalld."

["MBR (Master Boot Record)"]
hint = "историческая схема разметки диска. Хранит до четырёх «основных» разделов и не поддерживает диски больше 2 ТБ."

["mount"]
hint = "команда подключения файловой системы в дерево каталогов в указанную точку монтирования. Без аргументов выводит список смонтированных систем."

["Multi-user.target"]
hint = "цель загрузки systemd: система загружена, многопользовательский режим, сеть работает. Стандартный режим серверов."

["Namespace (пространство имён)"]
hint = "механизм ядра, изолирующий ресурсы (процессы, сеть, точки монтирования) для группы процессов. Используется контейнерами."

["NAS (Network Attached Storage)"]
hint = "сетевое хранилище, отдающее данные как файлы и каталоги по протоколам вроде NFS или SMB/CIFS."

["Netplan"]
hint = "современная система описания сетевой конфигурации в Ubuntu (с 17.10). YAML-файлы в /etc/netplan/."

["NetworkManager"]
hint = "служба управления сетевыми соединениями, типичная для Ubuntu Desktop, RHEL, Fedora."

["NFS (Network File System)"]
hint = "протокол сетевого файлового доступа, изначально из мира Unix. Сервер описывает экспортируемые каталоги в /etc/exports."

["nftables"]
hint = "современная подсистема фильтрации пакетов в Linux, преемник iptables."

["nice / renice"]
hint = "изменение приоритета процесса в диапазоне -20…19 (меньше — выше приоритет)."

["Образ (image)"]
hint = "шаблон контейнера. Контейнер создаётся как «запущенный экземпляр» образа."

["Опция команды (флаг)"]
hint = "модификатор поведения команды, обычно начинается с дефиса: ls -l, grep -i."

["Основной раздел (primary partition)"]
hint = "раздел в схеме MBR, способный нести загружаемую операционную систему. В MBR их не больше четырёх."

["Оболочка (shell)"]
hint = "программа-посредник между пользователем и операционной системой. Принимает команды и возвращает результат. Самая распространённая — Bash."

["Пакет (package)"]
hint = "архив с приложением и описанием его зависимостей. В Debian-системах — .deb, в RPM-системах — .rpm."

["Пакетный менеджер"]
hint = "утилита установки/удаления/обновления пакетов: apt, dpkg, yum, dnf, rpm."

["Перенаправление (redirection)"]
hint = "направление stdin/stdout/stderr процесса в файл или другую команду: >, >>, <, 2>, 2>&1, |."

["PID (Process ID)"]
hint = "числовой идентификатор процесса. Виден в ps и нужен kill/renice."

["Process substitution"]
hint = "конструкция <(...) или >(...), дающая команде вместо файла «псевдофайл», подключённый к выводу/вводу другой команды."

["PPID (Parent PID)"]
hint = "PID родительского процесса. В Linux у каждого процесса (кроме systemd с PID 1) есть родитель."

["Точка монтирования (mount point)"]
hint = "каталог в дереве файловой системы, в который смонтирована другая файловая система. В Linux нет «букв дисков» — все файлы видны как единое дерево."

["Приоритет процесса"]
hint = "число nice, влияющее на распределение процессорного времени. См. nice, renice."

["Process"]
hint = "см. процесс."

["Процесс"]
hint = "экземпляр запущенной программы. У каждого процесса есть PID, владелец и состояние (R, S, D, Z)."

["Прерывание Ctrl+C"]
hint = "посылает процессу сигнал SIGINT, по которому большинство программ корректно завершаются."

["PV (Physical Volume)"]
hint = "в терминологии LVM физический том: реальный диск или раздел, отданный под управление LVM."

["PATH"]
hint = "переменная окружения со списком каталогов, в которых оболочка ищет исполняемые файлы."

["PS1"]
hint = "переменная окружения, задающая внешний вид приглашения Bash. Поддерживает специальные подстановки вроде \\u, \\h, \\w."

["RAID"]
hint = "массив дисков с дублированием или распределением данных. В пособии не разбирается подробно, но упоминается рядом с LVM."

["Регулярное выражение (regex)"]
hint = "формальный язык для описания шаблонов в тексте. Применяется в grep, sed, awk. См. приложение «Регулярные выражения»."

["Репозиторий"]
hint = "сетевой источник пакетов. APT берёт пакеты из репозиториев, описанных в /etc/apt/sources.list и sources.list.d/."

["Root (рут)"]
hint = "особый пользователь с UID 0 и неограниченными правами. Прямой вход под root в современных Ubuntu обычно заблокирован — права получают через sudo."

["Runlevel"]
hint = "историческое понятие уровня загрузки в SysV-init. В systemd ту же роль играют targets."

["RPM"]
hint = "пакетный формат и одноимённая низкоуровневая утилита семейства RHEL/Fedora."

["RHEL (Red Hat Enterprise Linux)"]
hint = "коммерческий дистрибутив Linux. На его основе собраны CentOS Stream, Rocky Linux, AlmaLinux."

["SAN (Storage Area Network)"]
hint = "выделенная сеть хранения, отдающая клиентам данные на уровне блоков (как локальный диск)."

["scp"]
hint = "копирование файлов между машинами по защищённому каналу SSH."

["sed"]
hint = "потоковый редактор для построчной обработки текста. Часто используется с регулярными выражениями."

["Сессия (session)"]
hint = "связка пользователь + терминал на время одной работы в системе. Закрытие терминала или SSH-соединения завершает сессию."

["Сигнал (signal)"]
hint = "короткое уведомление, которое ядро или другой процесс посылает целевому процессу. Распространённые: SIGINT (Ctrl+C), SIGTERM (вежливое завершение), SIGKILL (принудительное), SIGHUP (перечитать конфигурацию)."

["Системный вызов (syscall)"]
hint = "запрос пользовательского процесса к ядру (open, read, write, fork). Граница между пользовательским и ядерным пространством."

["Skript / скрипт"]
hint = "текстовый файл с командами оболочки, исполняемый построчно. Первая строка — shebang (#!/bin/bash)."

["ss (socket statistics)"]
hint = "современная замена netstat. Показывает сокеты, открытые порты и активные соединения."

["SSH (Secure Shell)"]
hint = "протокол и команда для защищённой работы на удалённой машине по сети."

["sudo"]
hint = "выполнение одной команды от имени другого пользователя (по умолчанию root). Спрашивает ваш собственный пароль, а не пароль root."

["systemctl"]
hint = "главная команда управления службами systemd."

["systemd"]
hint = "современная система инициализации Linux и менеджер служб. Первый процесс системы (PID 1)."

["Stack trace"]
hint = "список вложенных вызовов функций в момент ошибки. Читается с конца — там лежит само исключение и место сбоя."

["stdin / stdout / stderr"]
hint = "стандартные потоки процесса: ввод, вывод и ошибки. Дескрипторы 0, 1, 2."

["Switch (коммутатор)"]
hint = "устройство, связывающее устройства внутри одной сети."

["Target (цель загрузки systemd)"]
hint = "состояние, в которое systemd «выводит» систему. Примеры: multi-user.target (сервер), graphical.target (рабочий стол)."

["Таблица маршрутизации (routing table)"]
hint = "список маршрутов в ядре. Показывается через ip route."

["Таймер (systemd timer)"]
hint = "unit-файл, запускающий другой unit по расписанию. Современная альтернатива cron."

["tmux / screen"]
hint = "менеджеры терминальных сессий: запустил задачу — отключился — задача продолжает работать."

["Точка монтирования"]
hint = "см. mount point."

["Traceroute"]
hint = "диагностическая команда, выводящая каждый промежуточный маршрутизатор на пути до цели."

["TTL (Time To Live)"]
hint = "поле IP-пакета, ограничивающее число хопов; используется и в DNS — там TTL это срок жизни ответа в кэше."

["UID (User ID)"]
hint = "числовой идентификатор пользователя. UID 0 — root."

["Юнит (systemd unit)"]
hint = "единица управления systemd: служба (.service), точка монтирования (.mount), таймер (.timer), цель (.target)."

["ufw (Uncomplicated Firewall)"]
hint = "упрощённая надстройка над nftables/iptables, типичная для Ubuntu."

["Umask"]
hint = "маска прав, которая обрезает права у вновь создаваемых файлов. По умолчанию 022: новые файлы — 644, новые каталоги — 755."

["Учётная запись"]
hint = "запись о пользователе в системе. Хранится в /etc/passwd и (для пароля) /etc/shadow."

["UUID (Universally Unique IDentifier)"]
hint = "уникальный идентификатор объекта (файловой системы, диска, раздела). Используется в /etc/fstab вместо изменчивых имён вроде /dev/sdb1."

["Файловая система (filesystem)"]
hint = "структура, по которой данные на разделе организованы в файлы и каталоги. Семейство в Linux: ext2/3/4, XFS, Btrfs, F2FS."

["Fibre Channel"]
hint = "оптическая технология построения SAN. В пособии не рассматривается подробно."

["Flag (флаг)"]
hint = "синоним опции команды."

["Foreground / background"]
hint = "выполнение процесса «на переднем плане» (с занятым терминалом) или «в фоне» (&). Управляется через fg, bg, jobs."

["fork"]
hint = "системный вызов, порождающий дочерний процесс."

["FQDN (Fully Qualified Domain Name)"]
hint = "полное доменное имя с указанием всех зон до корня: host.example.com.."

["Хост"]
hint = "узел в сети: компьютер, сервер, виртуальная машина."

["Хэш пароля"]
hint = "необратимое преобразование пароля. В Linux хранится в /etc/shadow."

["Цели загрузки"]
hint = "см. target."

["Чтение / запись / выполнение (r/w/x)"]
hint = "три права доступа Unix. Для файла: r — читать содержимое, w — изменять, x — запускать. Для каталога: r — видеть список, w — создавать/удалять файлы, x — входить в каталог."

["Шлюз"]
hint = "см. gateway."

["Шаблон оболочки (glob)"]
hint = "упрощённый шаблон имени: * (любая последовательность), ? (любой один символ), [abc] (один из перечисленных). Не путать с регулярным выражением."

["Ядро (kernel)"]
hint = "центральная часть операционной системы. Управляет памятью, процессами, оборудованием, файловыми системами."

["Ядерное пространство / пользовательское пространство (kernel space / user space)"]
hint = "две зоны выполнения. В ядерное переходят только через системные вызовы; пользовательские программы напрямую туда не лезут."

["API (Application Programming Interface)"]
hint = "интерфейс прикладного программирования: набор функций, через которые программы общаются между собой."

["ASCII"]
hint = "таблица соответствия символов и чисел от 0 до 127."

["awk"]
hint = "текстовый процессор для построчной обработки с поддержкой полей и регулярных выражений."

["CIDR (Classless Inter-Domain Routing)"]
hint = "запись подсети через косую черту: 192.168.1.0/24."

["curl"]
hint = "утилита для HTTP/HTTPS-запросов из командной строки."

["FHS (Filesystem Hierarchy Standard)"]
hint = "стандарт назначения каталогов корня в Linux (/etc, /usr, /var, …)."

["GECOS"]
hint = "пятое поле в /etc/passwd, традиционно для имени пользователя и контактной информации."

["HTTP / HTTPS"]
hint = "протоколы веб-обмена. HTTPS — HTTP поверх шифрованного TLS-канала."

["journalctl"]
hint = "команда для чтения systemd-журнала."

["kill"]
hint = "команда отправки сигнала процессу."

["nohup"]
hint = "запуск процесса без привязки к терминалу (no hangup)."

["pgrep / pkill"]
hint = "поиск/убивание процессов по имени."

["Polkit / PAM"]
hint = "системы аутентификации и проверки прав. В курсе упоминаются вскользь."

["tar"]
hint = "утилита создания и распаковки архивов. Часто в связке с gzip (tar.gz)."

["TCP / UDP"]
hint = "транспортные протоколы. TCP с установкой соединения и подтверждением; UDP — без, быстрее."

["venv"]
hint = "модуль Python для создания изолированных окружений."

["Wildcard"]
hint = "обиходное название glob-шаблона."

["YUM / DNF"]
hint = "пакетные менеджеры RPM-семейства. dnf — преемник yum, синтаксис в основном совместим."

["zsh"]
hint = "альтернативная оболочка, популярная среди опытных пользователей (по умолчанию в macOS)."
