<svg viewBox="0 0 920 240" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif">
  <rect width="920" height="240" fill="#FFFFFF"/>

  <text x="460" y="40" font-size="22" font-weight="700" fill="#1A2B3C" text-anchor="middle">Безопасность Linux<tspan fill="#9AA3AD" font-weight="400" font-size="14">   ·   из чего складывается</tspan></text>

  <!-- Корень -->
  <rect x="370" y="70" width="180" height="44" rx="10" fill="#2E9E8F"/>
  <text x="460" y="97" font-size="15" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Безопасность Linux</text>

  <!-- Ствол и ветки -->
  <g stroke="#8A97A3" stroke-width="1.5" stroke-dasharray="4 3" fill="none">
    <line x1="460" y1="114" x2="460" y2="140"/>
    <line x1="120" y1="140" x2="800" y2="140"/>
    <line x1="120" y1="140" x2="120" y2="160"/>
    <line x1="256" y1="140" x2="256" y2="160"/>
    <line x1="392" y1="140" x2="392" y2="160"/>
    <line x1="528" y1="140" x2="528" y2="160"/>
    <line x1="664" y1="140" x2="664" y2="160"/>
    <line x1="800" y1="140" x2="800" y2="160"/>
  </g>

  <g font-size="13" font-weight="bold" fill="#1A2B3C" text-anchor="middle">
    <rect x="55" y="160" width="130" height="62" rx="10" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.2"/>
    <text x="120" y="190">Контроль</text>
    <text x="120" y="206">доступа</text>

    <rect x="191" y="160" width="130" height="62" rx="10" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.2"/>
    <text x="256" y="198">PAM</text>

    <rect x="327" y="160" width="130" height="62" rx="10" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.2"/>
    <text x="392" y="198">Сеть</text>

    <rect x="463" y="160" width="130" height="62" rx="10" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.2"/>
    <text x="528" y="190">SSH</text>
    <text x="528" y="206" font-weight="normal" font-size="11" fill="#9AA3AD">harden</text>

    <rect x="599" y="160" width="130" height="62" rx="10" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.2"/>
    <text x="664" y="198">SELinux</text>

    <rect x="735" y="160" width="130" height="62" rx="10" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.2"/>
    <text x="800" y="198" font-style="italic" font-weight="normal" fill="#9AA3AD">и другое</text>
  </g>
</svg>
