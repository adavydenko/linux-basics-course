<svg viewBox="0 0 720 240" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif">
  <rect width="720" height="240" fill="#FFFFFF"/>

  <text x="360" y="40" font-size="22" font-weight="700" fill="#1A2B3C" text-anchor="middle">dpkg без зависимостей<tspan fill="#9AA3AD" font-weight="400" font-size="14">   ·   установка не доходит до конца</tspan></text>

  <!-- Левая карточка: система -->
  <rect x="40" y="100" width="200" height="100" rx="12" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.5"/>
  <circle cx="140" cy="140" r="22" fill="#ECF6F4"/>
  <g transform="translate(128,128)" stroke="#2E9E8F" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="5" width="18" height="12" rx="1"/>
    <line x1="10" y1="17" x2="14" y2="17"/>
    <line x1="8" y1="20" x2="16" y2="20"/>
  </g>
  <text x="140" y="184" font-size="14" font-weight="bold" fill="#1A2B3C" text-anchor="middle">Ubuntu 18.04</text>

  <!-- Правая карточка: пакет -->
  <rect x="480" y="100" width="200" height="100" rx="12" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.5"/>
  <circle cx="580" cy="140" r="22" fill="#ECF6F4"/>
  <g transform="translate(568,128)" stroke="#2E9E8F" stroke-width="1.7" fill="none" stroke-linejoin="round">
    <path d="M3,7 L12,3 L21,7 V17 L12,21 L3,17 Z"/>
    <path d="M3,7 L12,11 L21,7"/>
    <path d="M12,11 V21"/>
  </g>
  <text x="580" y="180" font-size="14" font-weight="bold" fill="#1A2B3C" text-anchor="middle" font-family="DejaVu Sans Mono, Consolas, monospace">gimp.deb</text>
  <text x="580" y="194" font-size="11" fill="#9AA3AD" text-anchor="middle">пакет</text>

  <!-- Сломанная связь: пунктирная стрелка с крестом -->
  <line x1="476" y1="150" x2="244" y2="150" stroke="#8A97A3" stroke-width="1.8" stroke-dasharray="6 4"/>
  <circle cx="360" cy="150" r="16" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.5"/>
  <g stroke="#5A6B7B" stroke-width="3" stroke-linecap="round">
    <line x1="351" y1="141" x2="369" y2="159"/>
    <line x1="369" y1="141" x2="351" y2="159"/>
  </g>
  <text x="360" y="190" font-size="12" font-weight="bold" fill="#1A2B3C" text-anchor="middle">не хватает зависимостей</text>
</svg>
