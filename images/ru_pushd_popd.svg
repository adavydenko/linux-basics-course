<svg viewBox="0 0 600 320" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif">
  <rect width="600" height="320" fill="#FFFFFF"/>
  <defs>
    <marker id="ppa" markerWidth="7" markerHeight="7" refX="5.5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#2E9E8F"/></marker>
  </defs>

  <!-- Заголовок -->
  <text x="40" y="46" font-size="22" font-weight="700" fill="#1A2B3C">Стек каталогов<tspan fill="#9AA3AD" font-weight="400" font-size="14">   ·   pushd и popd</tspan></text>

  <!-- Push: метка и стрелка вниз -->
  <text x="240" y="92" font-size="15" font-weight="bold" fill="#1A2B3C" text-anchor="middle">Push</text>
  <text x="240" y="108" font-size="11" fill="#5A6B7B" text-anchor="middle">положить в стек</text>
  <line x1="240" y1="116" x2="240" y2="138" stroke="#2E9E8F" stroke-width="2" marker-end="url(#ppa)"/>

  <!-- Pop: метка и стрелка вверх -->
  <text x="360" y="92" font-size="15" font-weight="bold" fill="#1A2B3C" text-anchor="middle">Pop</text>
  <text x="360" y="108" font-size="11" fill="#5A6B7B" text-anchor="middle">взять с верха</text>
  <line x1="360" y1="138" x2="360" y2="116" stroke="#2E9E8F" stroke-width="2" marker-end="url(#ppa)"/>

  <!-- Стек: контейнер с разделителями -->
  <rect x="200" y="142" width="200" height="168" rx="8" fill="#FFFFFF" stroke="#2E9E8F" stroke-width="2"/>

  <g font-family="DejaVu Sans Mono, Consolas, monospace" font-size="15" fill="#1A2B3C" text-anchor="middle">
    <text x="300" y="170">/tmp</text>
    <text x="300" y="212">/var</text>
    <text x="300" y="254">/etc</text>
    <text x="300" y="296">~</text>
  </g>

  <g stroke="#E4E7EB" stroke-width="1.2">
    <line x1="200" y1="184" x2="400" y2="184"/>
    <line x1="200" y1="226" x2="400" y2="226"/>
    <line x1="200" y1="268" x2="400" y2="268"/>
  </g>

  <!-- Подписи краёв стека -->
  <text x="410" y="170" font-size="11" fill="#9AA3AD">← вершина</text>
  <text x="410" y="296" font-size="11" fill="#9AA3AD">← дно (исходный)</text>
</svg>
