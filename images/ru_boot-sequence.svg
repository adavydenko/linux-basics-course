<svg viewBox="0 0 820 250" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif">
  <rect width="820" height="250" fill="#FFFFFF"/>
  <defs>
    <marker id="seqarrow" markerWidth="7" markerHeight="7" refX="5.5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#5A6B7B"/></marker>
  </defs>

  <!-- Заголовок -->
  <text x="40" y="46" font-size="24" font-weight="700" fill="#1A2B3C">Загрузка Linux<tspan fill="#9AA3AD" font-weight="400" font-size="14">   ·   общая последовательность</tspan></text>

  <!-- Структурные стрелки в muted-цвете -->
  <line x1="155" y1="155" x2="278" y2="155" stroke="#5A6B7B" stroke-width="1.8" marker-end="url(#seqarrow)"/>
  <line x1="348" y1="155" x2="471" y2="155" stroke="#5A6B7B" stroke-width="1.8" marker-end="url(#seqarrow)"/>
  <line x1="541" y1="155" x2="664" y2="155" stroke="#5A6B7B" stroke-width="1.8" marker-end="url(#seqarrow)"/>

  <!-- Узел 1 — BIOS / POST -->
  <text x="120" y="110" font-size="22" font-weight="bold" fill="#5A6B7B" text-anchor="middle">01</text>
  <circle cx="120" cy="155" r="30" fill="#FFFFFF" stroke="#D4D9DF" stroke-width="1.5"/>
  <g transform="translate(108,143)" stroke="#2E9E8F" stroke-width="1.6" fill="none" stroke-linecap="round">
    <rect x="6" y="6" width="12" height="12" rx="1.5"/>
    <line x1="9" y1="6" x2="9" y2="3"/><line x1="15" y1="6" x2="15" y2="3"/>
    <line x1="9" y1="18" x2="9" y2="21"/><line x1="15" y1="18" x2="15" y2="21"/>
    <line x1="6" y1="9" x2="3" y2="9"/><line x1="6" y1="15" x2="3" y2="15"/>
    <line x1="18" y1="9" x2="21" y2="9"/><line x1="18" y1="15" x2="21" y2="15"/>
  </g>
  <text x="120" y="215" font-size="14" font-weight="bold" fill="#1A2B3C" text-anchor="middle">BIOS / POST</text>

  <!-- Узел 2 — Загрузчик -->
  <text x="313" y="110" font-size="22" font-weight="bold" fill="#5A6B7B" text-anchor="middle">02</text>
  <circle cx="313" cy="155" r="30" fill="#FFFFFF" stroke="#D4D9DF" stroke-width="1.5"/>
  <g transform="translate(301,143)" stroke="#2E9E8F" stroke-width="1.6" fill="none" stroke-linecap="round">
    <rect x="4" y="5" width="16" height="4" rx="1.5"/>
    <rect x="4" y="10" width="16" height="4" rx="1.5"/>
    <rect x="4" y="15" width="16" height="4" rx="1.5"/>
  </g>
  <text x="313" y="215" font-size="14" font-weight="bold" fill="#1A2B3C" text-anchor="middle">Загрузчик</text>
  <text x="313" y="235" font-size="12" fill="#9AA3AD" text-anchor="middle" font-family="DejaVu Sans Mono, Consolas, monospace">GRUB2</text>

  <!-- Узел 3 — Инициализация ядра -->
  <text x="506" y="110" font-size="22" font-weight="bold" fill="#5A6B7B" text-anchor="middle">03</text>
  <circle cx="506" cy="155" r="30" fill="#FFFFFF" stroke="#D4D9DF" stroke-width="1.5"/>
  <g transform="translate(494,143)" stroke="#2E9E8F" stroke-width="1.6" fill="none">
    <circle cx="12" cy="12" r="8"/>
    <circle cx="12" cy="12" r="3" fill="#2E9E8F"/>
  </g>
  <text x="506" y="215" font-size="14" font-weight="bold" fill="#1A2B3C" text-anchor="middle">Инициализация ядра</text>

  <!-- Узел 4 — Процесс init -->
  <text x="699" y="110" font-size="22" font-weight="bold" fill="#5A6B7B" text-anchor="middle">04</text>
  <circle cx="699" cy="155" r="30" fill="#FFFFFF" stroke="#D4D9DF" stroke-width="1.5"/>
  <g transform="translate(687,143)">
    <circle cx="12" cy="4" r="3" fill="#2E9E8F"/>
    <circle cx="5" cy="18" r="2.3" fill="#FFFFFF" stroke="#2E9E8F" stroke-width="1.6"/>
    <circle cx="12" cy="18" r="2.3" fill="#FFFFFF" stroke="#2E9E8F" stroke-width="1.6"/>
    <circle cx="19" cy="18" r="2.3" fill="#FFFFFF" stroke="#2E9E8F" stroke-width="1.6"/>
    <path d="M12,7 L5,15.7 M12,7 L12,15.7 M12,7 L19,15.7" stroke="#2E9E8F" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  </g>
  <text x="699" y="215" font-size="14" font-weight="bold" fill="#1A2B3C" text-anchor="middle">Процесс init</text>
  <text x="699" y="235" font-size="12" fill="#9AA3AD" text-anchor="middle" font-family="DejaVu Sans Mono, Consolas, monospace">systemd</text>
</svg>
