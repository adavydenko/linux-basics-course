<svg viewBox="0 0 720 240" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif">
  <rect width="720" height="240" fill="#FFFFFF"/>
  <defs>
    <marker id="scpA" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#2E9E8F"/></marker>
  </defs>

  <text x="40" y="40" font-size="22" font-weight="700" fill="#1A2B3C">SCP<tspan fill="#9AA3AD" font-weight="400" font-size="14">   ·   копирование файлов поверх SSH</tspan></text>

  <!-- Клиент -->
  <rect x="40" y="100" width="220" height="100" rx="12" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.5"/>
  <circle cx="140" cy="140" r="26" fill="#ECF6F4"/>
  <g transform="translate(128,128)" stroke="#2E9E8F" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="8" r="3.5"/>
    <path d="M5,20 a7,7 0 0 1 14,0"/>
  </g>
  <text x="140" y="184" font-size="14" font-weight="bold" fill="#1A2B3C" text-anchor="middle">Клиент</text>

  <!-- Стрелка SSH/port 22 -->
  <text x="360" y="130" font-size="13" font-weight="bold" fill="#2E9E8F" text-anchor="middle">SSH / порт 22</text>
  <text x="360" y="148" font-size="11" fill="#9AA3AD" text-anchor="middle">шифрованный канал</text>
  <line x1="270" y1="160" x2="450" y2="160" stroke="#2E9E8F" stroke-width="2.5" marker-end="url(#scpA)"/>
  <text x="360" y="180" font-size="11" font-family="DejaVu Sans Mono, Consolas, monospace" fill="#5A6B7B" text-anchor="middle">$ scp файл user@host:путь</text>

  <!-- Сервер -->
  <rect x="460" y="100" width="220" height="100" rx="12" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.5"/>
  <circle cx="560" cy="140" r="26" fill="#ECF6F4"/>
  <g transform="translate(548,128)" stroke="#2E9E8F" stroke-width="1.7" fill="none" stroke-linejoin="round">
    <rect x="3" y="4" width="18" height="6" rx="1"/>
    <rect x="3" y="12" width="18" height="6" rx="1"/>
    <circle cx="7" cy="7" r="0.8" fill="#2E9E8F"/>
    <circle cx="7" cy="15" r="0.8" fill="#2E9E8F"/>
  </g>
  <text x="560" y="184" font-size="14" font-weight="bold" fill="#1A2B3C" text-anchor="middle">Сервер</text>
</svg>
