<svg viewBox="0 0 720 400" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif">
  <rect width="720" height="400" fill="#FFFFFF"/>

  <text x="360" y="40" font-size="22" font-weight="700" fill="#1A2B3C" text-anchor="middle">Домашний каталог<tspan fill="#9AA3AD" font-weight="400" font-size="14">   ·   личное пространство в /home</tspan></text>

  <!-- Корень / -->
  <rect x="335" y="70" width="50" height="36" rx="6" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.5"/>
  <text x="360" y="93" font-size="14" font-weight="bold" fill="#1A2B3C" text-anchor="middle" font-family="DejaVu Sans Mono, Consolas, monospace">/</text>

  <!-- Линия вниз к /home -->
  <line x1="360" y1="106" x2="360" y2="130" stroke="#8A97A3" stroke-width="1.4" stroke-dasharray="4 3"/>

  <!-- /home -->
  <rect x="315" y="130" width="90" height="36" rx="6" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.5"/>
  <text x="360" y="153" font-size="13" font-weight="bold" fill="#1A2B3C" text-anchor="middle" font-family="DejaVu Sans Mono, Consolas, monospace">home</text>

  <!-- Разветвление к allen и michael -->
  <g stroke="#8A97A3" stroke-width="1.4" fill="none" stroke-dasharray="4 3">
    <path d="M 360 166 L 360 192 L 170 192 L 170 220"/>
    <path d="M 360 166 L 360 192 L 550 192 L 550 220"/>
  </g>

  <!-- Левая ветка: allen -->
  <rect x="80" y="220" width="180" height="40" rx="8" fill="#2E9E8F"/>
  <text x="170" y="246" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle" font-family="DejaVu Sans Mono, Consolas, monospace">/home/allen</text>

  <!-- Подпись пользователя allen -->
  <text x="170" y="280" font-size="12" fill="#5A6B7B" text-anchor="middle">пользователь allen</text>

  <!-- Файлы allen -->
  <g stroke="#8A97A3" stroke-width="1.3" fill="none" stroke-dasharray="3 3">
    <line x1="170" y1="290" x2="120" y2="320"/>
    <line x1="170" y1="290" x2="220" y2="320"/>
  </g>
  <rect x="70" y="320" width="100" height="32" rx="6" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.3"/>
  <text x="120" y="340" font-size="12" fill="#1A2B3C" text-anchor="middle" font-family="DejaVu Sans Mono, Consolas, monospace">code1</text>
  <rect x="170" y="320" width="100" height="32" rx="6" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.3"/>
  <text x="220" y="340" font-size="12" fill="#1A2B3C" text-anchor="middle" font-family="DejaVu Sans Mono, Consolas, monospace">Payroll.txt</text>

  <!-- Правая ветка: michael -->
  <rect x="460" y="220" width="180" height="40" rx="8" fill="#2E9E8F"/>
  <text x="550" y="246" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle" font-family="DejaVu Sans Mono, Consolas, monospace">/home/michael</text>

  <!-- Подпись пользователя michael -->
  <text x="550" y="280" font-size="12" fill="#5A6B7B" text-anchor="middle">пользователь michael</text>

  <!-- Файлы michael -->
  <g stroke="#8A97A3" stroke-width="1.3" fill="none" stroke-dasharray="3 3">
    <line x1="550" y1="290" x2="500" y2="320"/>
    <line x1="550" y1="290" x2="600" y2="320"/>
  </g>
  <rect x="450" y="320" width="100" height="32" rx="6" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.3"/>
  <text x="500" y="340" font-size="12" fill="#1A2B3C" text-anchor="middle" font-family="DejaVu Sans Mono, Consolas, monospace">file1</text>
  <rect x="550" y="320" width="100" height="32" rx="6" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.3"/>
  <text x="600" y="340" font-size="12" fill="#1A2B3C" text-anchor="middle" font-family="DejaVu Sans Mono, Consolas, monospace">file2</text>

  <!-- Сноска про тильду -->
  <rect x="285" y="335" width="150" height="44" rx="6" fill="#ECF6F4" stroke="#2E9E8F" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="360" y="354" font-size="11" fill="#5A6B7B" text-anchor="middle">домашний каталог</text>
  <text x="360" y="370" font-size="13" font-weight="bold" fill="#1A2B3C" text-anchor="middle" font-family="DejaVu Sans Mono, Consolas, monospace">~ (tilde)</text>
</svg>
