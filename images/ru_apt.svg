<svg viewBox="0 0 580 520" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif">
  <rect width="580" height="520" fill="#FFFFFF"/>
  <defs>
    <marker id="aptA" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#5A6B7B"/></marker>
  </defs>

  <text x="290" y="40" font-size="22" font-weight="700" fill="#1A2B3C" text-anchor="middle">APT<tspan fill="#9AA3AD" font-weight="400" font-size="14">   ·   от репозитория к машине</tspan></text>

  <!-- Уровень 1: репозиторий -->
  <rect x="160" y="80" width="260" height="80" rx="12" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.5"/>
  <text x="290" y="112" font-size="15" font-weight="bold" fill="#1A2B3C" text-anchor="middle">Репозиторий ПО</text>
  <rect x="180" y="124" width="220" height="24" rx="4" fill="#F8F9FA"/>
  <text x="290" y="141" font-size="12" font-family="DejaVu Sans Mono, Consolas, monospace" fill="#1A2B3C" text-anchor="middle">/etc/apt/sources.list</text>

  <line x1="290" y1="166" x2="290" y2="198" stroke="#5A6B7B" stroke-width="1.8" marker-end="url(#aptA)"/>
  <text x="305" y="186" font-size="11" fill="#9AA3AD">локально или по HTTP/HTTPS/FTP</text>

  <!-- Уровень 2: APT -->
  <rect x="160" y="204" width="260" height="80" rx="12" fill="#ECF6F4" stroke="#2E9E8F" stroke-width="1.5"/>
  <text x="290" y="236" font-size="15" font-weight="bold" fill="#1A2B3C" text-anchor="middle">APT</text>
  <text x="290" y="258" font-size="12" fill="#5A6B7B" text-anchor="middle">высокоуровневый менеджер</text>

  <line x1="290" y1="290" x2="290" y2="322" stroke="#5A6B7B" stroke-width="1.8" marker-end="url(#aptA)"/>

  <!-- Уровень 3: DPKG -->
  <rect x="160" y="328" width="260" height="80" rx="12" fill="#ECF6F4" stroke="#2E9E8F" stroke-width="1.5"/>
  <text x="290" y="360" font-size="15" font-weight="bold" fill="#1A2B3C" text-anchor="middle">DPKG</text>
  <text x="290" y="382" font-size="12" fill="#5A6B7B" text-anchor="middle">низкоуровневый менеджер</text>

  <line x1="290" y1="414" x2="290" y2="446" stroke="#5A6B7B" stroke-width="1.8" marker-end="url(#aptA)"/>

  <!-- Уровень 4: машина -->
  <rect x="160" y="452" width="260" height="56" rx="12" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.5"/>
  <text x="290" y="486" font-size="15" font-weight="bold" fill="#1A2B3C" text-anchor="middle">Linux-машина</text>
</svg>
