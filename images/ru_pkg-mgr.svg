<svg viewBox="0 0 760 230" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif">
  <rect width="760" height="230" fill="#FFFFFF"/>
  <defs>
    <marker id="pmA" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#5A6B7B"/></marker>
  </defs>

  <text x="380" y="46" font-size="22" font-weight="700" fill="#1A2B3C" text-anchor="middle">Пакетный менеджер<tspan fill="#9AA3AD" font-weight="400" font-size="14">   ·   мост между репозиторием и системой</tspan></text>

  <!-- Linux-система -->
  <rect x="40" y="100" width="200" height="90" rx="12" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.5"/>
  <circle cx="140" cy="135" r="20" fill="#ECF6F4"/>
  <g transform="translate(128,123)" stroke="#2E9E8F" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="5" width="18" height="12" rx="1"/>
    <line x1="10" y1="17" x2="14" y2="17"/>
    <line x1="8" y1="20" x2="16" y2="20"/>
  </g>
  <text x="140" y="178" font-size="14" font-weight="bold" fill="#1A2B3C" text-anchor="middle">Linux-система</text>

  <!-- Пакетный менеджер -->
  <rect x="280" y="100" width="200" height="90" rx="12" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.5"/>
  <circle cx="380" cy="135" r="20" fill="#ECF6F4"/>
  <g transform="translate(368,123)" stroke="#2E9E8F" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3.5"/>
    <line x1="12" y1="3" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="21"/>
    <line x1="3" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="21" y2="12"/>
    <line x1="6" y1="6" x2="8" y2="8"/><line x1="16" y1="16" x2="18" y2="18"/>
    <line x1="6" y1="18" x2="8" y2="16"/><line x1="16" y1="8" x2="18" y2="6"/>
  </g>
  <text x="380" y="178" font-size="14" font-weight="bold" fill="#1A2B3C" text-anchor="middle">Пакетный менеджер</text>

  <!-- Репозиторий -->
  <rect x="520" y="100" width="200" height="90" rx="12" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.5"/>
  <circle cx="620" cy="135" r="20" fill="#ECF6F4"/>
  <g transform="translate(608,123)" stroke="#2E9E8F" stroke-width="1.7" fill="none" stroke-linejoin="round">
    <path d="M3,7 L12,3 L21,7 V17 L12,21 L3,17 Z"/>
    <path d="M3,7 L12,11 L21,7"/>
    <path d="M12,11 V21"/>
  </g>
  <text x="620" y="174" font-size="14" font-weight="bold" fill="#1A2B3C" text-anchor="middle">Репозиторий</text>
  <text x="620" y="190" font-size="11" fill="#9AA3AD" text-anchor="middle">пакет + зависимости</text>

  <!-- Стрелки: репозиторий → менеджер → система -->
  <line x1="514" y1="145" x2="486" y2="145" stroke="#5A6B7B" stroke-width="1.8" marker-end="url(#pmA)"/>
  <line x1="274" y1="145" x2="246" y2="145" stroke="#5A6B7B" stroke-width="1.8" marker-end="url(#pmA)"/>
</svg>
