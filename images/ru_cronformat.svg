<svg viewBox="0 0 740 270" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif">
  <rect width="740" height="270" fill="#FFFFFF"/>

  <!-- Заголовок -->
  <text x="40" y="46" font-size="22" font-weight="700" fill="#1A2B3C">Формат crontab<tspan fill="#9AA3AD" font-weight="400" font-size="14">   ·   пять полей расписания</tspan></text>

  <!-- Звёздочки полей -->
  <g font-family="DejaVu Sans Mono, Consolas, monospace" font-size="28" font-weight="bold" fill="#2E9E8F" text-anchor="middle">
    <text x="90" y="115">*</text>
    <text x="150" y="115">*</text>
    <text x="210" y="115">*</text>
    <text x="270" y="115">*</text>
    <text x="330" y="115">*</text>
  </g>
  <text x="380" y="115" font-size="16" font-family="DejaVu Sans Mono, Consolas, monospace" fill="#5A6B7B">команда</text>

  <!-- Линии-выноски: от каждой звёздочки к подписи -->
  <g stroke="#8A97A3" stroke-width="1.5" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <path d="M330,128 V145 H395"/>
    <path d="M270,128 V170 H395"/>
    <path d="M210,128 V195 H395"/>
    <path d="M150,128 V220 H395"/>
    <path d="M90,128 V245 H395"/>
  </g>

  <!-- Подписи полей -->
  <g font-size="14">
    <text x="405" y="150"><tspan font-weight="bold" fill="#1A2B3C">День недели</tspan><tspan fill="#9AA3AD">  (0 — вс … 6 — сб)</tspan></text>
    <text x="405" y="175"><tspan font-weight="bold" fill="#1A2B3C">Месяц</tspan><tspan fill="#9AA3AD">  (1–12)</tspan></text>
    <text x="405" y="200"><tspan font-weight="bold" fill="#1A2B3C">День месяца</tspan><tspan fill="#9AA3AD">  (1–31)</tspan></text>
    <text x="405" y="225"><tspan font-weight="bold" fill="#1A2B3C">Час</tspan><tspan fill="#9AA3AD">  (0–23)</tspan></text>
    <text x="405" y="250"><tspan font-weight="bold" fill="#1A2B3C">Минута</tspan><tspan fill="#9AA3AD">  (0–59)</tspan></text>
  </g>
</svg>
