<svg viewBox="0 0 600 230" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif">
  <rect width="600" height="230" fill="#FFFFFF"/>

  <text x="40" y="46" font-size="22" font-weight="700" fill="#1A2B3C">Приглашение Bash<tspan fill="#9AA3AD" font-weight="400" font-size="14">   ·   что означают символы</tspan></text>

  <!-- Терминальный блок -->
  <rect x="200" y="90" width="200" height="60" rx="8" fill="#1E2A35"/>
  <g font-family="DejaVu Sans Mono, Consolas, monospace" font-size="28" fill="#9FF59A" text-anchor="middle">
    <text x="278" y="130">[</text>
    <text x="296" y="130">~</text>
    <text x="314" y="130">]</text>
    <text x="334" y="130">$</text>
  </g>

  <!-- Соединительные линии -->
  <g stroke="#8A97A3" stroke-width="1.5" fill="none" stroke-linecap="round">
    <path d="M296,160 V178 H180 V198"/>
    <path d="M334,160 V178 H440 V198"/>
  </g>

  <!-- Подписи -->
  <g font-size="13">
    <text x="180" y="213" text-anchor="middle"><tspan font-weight="bold" fill="#1A2B3C">~</tspan><tspan fill="#5A6B7B"> — текущий каталог (домашний)</tspan></text>
    <text x="440" y="213" text-anchor="middle"><tspan font-weight="bold" fill="#1A2B3C">$</tspan><tspan fill="#5A6B7B"> — приглашение к вводу</tspan></text>
  </g>
</svg>
