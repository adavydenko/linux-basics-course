<svg viewBox="0 0 720 240" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif">
  <rect width="720" height="240" fill="#FFFFFF"/>
  <defs>
    <marker id="pipeA" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#2E9E8F"/></marker>
  </defs>

  <text x="40" y="40" font-size="22" font-weight="700" fill="#1A2B3C">Конвейер<tspan fill="#9AA3AD" font-weight="400" font-size="14">   ·   вывод одной команды попадает на вход другой</tspan></text>

  <!-- Команда 1 -->
  <rect x="40" y="100" width="240" height="100" rx="12" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.5"/>
  <text x="160" y="130" font-size="14" font-weight="bold" fill="#1A2B3C" text-anchor="middle">Команда 1</text>
  <rect x="60" y="146" width="200" height="36" rx="6" fill="#1E2A35"/>
  <text x="160" y="170" font-size="13" font-family="DejaVu Sans Mono, Consolas, monospace" fill="#9FF59A" text-anchor="middle">grep Hello sample.txt</text>

  <!-- Символ канала + стрелка -->
  <text x="360" y="142" font-size="36" font-weight="bold" fill="#2E9E8F" text-anchor="middle" font-family="DejaVu Sans Mono, Consolas, monospace">|</text>
  <line x1="296" y1="160" x2="424" y2="160" stroke="#2E9E8F" stroke-width="2.5" marker-end="url(#pipeA)"/>
  <text x="360" y="190" font-size="11" fill="#9AA3AD" text-anchor="middle">stdout → stdin</text>

  <!-- Команда 2 -->
  <rect x="440" y="100" width="240" height="100" rx="12" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.5"/>
  <text x="560" y="130" font-size="14" font-weight="bold" fill="#1A2B3C" text-anchor="middle">Команда 2</text>
  <rect x="460" y="146" width="200" height="36" rx="6" fill="#1E2A35"/>
  <text x="560" y="170" font-size="13" font-family="DejaVu Sans Mono, Consolas, monospace" fill="#9FF59A" text-anchor="middle">less</text>
</svg>
