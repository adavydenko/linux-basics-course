<svg viewBox="0 0 720 220" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif">
  <rect width="720" height="220" fill="#FFFFFF"/>

  <text x="40" y="40" font-size="22" font-weight="700" fill="#1A2B3C">Учётные записи Linux<tspan fill="#9AA3AD" font-weight="400" font-size="14">   ·   пользователь и группа</tspan></text>

  <!-- Карточка: пользователь -->
  <rect x="40" y="90" width="300" height="110" rx="14" fill="#FFFFFF" stroke="#E4E7EB" stroke-width="1.5"/>
  <circle cx="100" cy="145" r="26" fill="#ECF6F4"/>
  <g transform="translate(88,133)" stroke="#2E9E8F" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="8" r="3.5"/>
    <path d="M5,20 a7,7 0 0 1 14,0"/>
  </g>
  <text x="160" y="135" font-size="16" font-weight="bold" fill="#1A2B3C">Пользователь</text>
  <text x="160" y="158" font-size="12" font-family="DejaVu Sans Mono, Consolas, monospace" fill="#5A6B7B">/etc/passwd</text>
  <text x="160" y="180" font-size="11" fill="#9AA3AD">учётная запись одного человека</text>

  <!-- Карточка: группа -->
  <rect x="380" y="90" width="300" height="110" rx="14" fill="#FFFFFF" stroke="#E4E7EB" stroke-width="1.5"/>
  <circle cx="440" cy="145" r="26" fill="#ECF6F4"/>
  <g transform="translate(425,133)" stroke="#2E9E8F" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="9" cy="8" r="3"/>
    <circle cx="18" cy="8" r="3"/>
    <path d="M4,20 a5,5 0 0 1 10,0"/>
    <path d="M13,20 a5,5 0 0 1 10,0"/>
  </g>
  <text x="500" y="135" font-size="16" font-weight="bold" fill="#1A2B3C">Группа</text>
  <text x="500" y="158" font-size="12" font-family="DejaVu Sans Mono, Consolas, monospace" fill="#5A6B7B">/etc/group</text>
  <text x="500" y="180" font-size="11" fill="#9AA3AD">набор пользователей с общими правами</text>
</svg>
