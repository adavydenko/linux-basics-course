<svg viewBox="0 0 980 260" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif">
  <rect width="980" height="260" fill="#FFFFFF"/>

  <text x="490" y="46" font-size="22" font-weight="700" fill="#1A2B3C" text-anchor="middle">Иерархия файловой системы<tspan fill="#9AA3AD" font-weight="400" font-size="14">   ·   главные каталоги корня</tspan></text>

  <!-- Корень / -->
  <rect x="430" y="80" width="120" height="44" rx="10" fill="#2E9E8F"/>
  <text x="490" y="103" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">/ (корень)</text>

  <!-- Ствол и ветки -->
  <g stroke="#8A97A3" stroke-width="1.5" stroke-dasharray="4 3" fill="none">
    <line x1="490" y1="124" x2="490" y2="140"/>
    <line x1="52" y1="140" x2="932" y2="140"/>
    <line x1="52" y1="140" x2="52" y2="160"/>
    <line x1="122" y1="140" x2="122" y2="160"/>
    <line x1="192" y1="140" x2="192" y2="160"/>
    <line x1="262" y1="140" x2="262" y2="160"/>
    <line x1="332" y1="140" x2="332" y2="160"/>
    <line x1="402" y1="140" x2="402" y2="160"/>
    <line x1="472" y1="140" x2="472" y2="160"/>
    <line x1="542" y1="140" x2="542" y2="160"/>
    <line x1="612" y1="140" x2="612" y2="160"/>
    <line x1="682" y1="140" x2="682" y2="160"/>
    <line x1="752" y1="140" x2="752" y2="160"/>
    <line x1="822" y1="140" x2="822" y2="160"/>
    <line x1="892" y1="140" x2="892" y2="160"/>
  </g>

  <!-- 13 главных каталогов -->
  <g font-family="DejaVu Sans Mono, Consolas, monospace" font-size="12" font-weight="bold" fill="#1A2B3C" text-anchor="middle">
    <rect x="20" y="160" width="64" height="44" rx="8" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.2"/>
    <text x="52" y="187">/bin</text>

    <rect x="90" y="160" width="64" height="44" rx="8" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.2"/>
    <text x="122" y="187">/boot</text>

    <rect x="160" y="160" width="64" height="44" rx="8" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.2"/>
    <text x="192" y="187">/dev</text>

    <rect x="230" y="160" width="64" height="44" rx="8" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.2"/>
    <text x="262" y="187">/etc</text>

    <rect x="300" y="160" width="64" height="44" rx="8" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.2"/>
    <text x="332" y="187">/home</text>

    <rect x="370" y="160" width="64" height="44" rx="8" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.2"/>
    <text x="402" y="187">/lib</text>

    <rect x="440" y="160" width="64" height="44" rx="8" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.2"/>
    <text x="472" y="187">/media</text>

    <rect x="510" y="160" width="64" height="44" rx="8" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.2"/>
    <text x="542" y="187">/mnt</text>

    <rect x="580" y="160" width="64" height="44" rx="8" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.2"/>
    <text x="612" y="187">/opt</text>

    <rect x="650" y="160" width="64" height="44" rx="8" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.2"/>
    <text x="682" y="187">/root</text>

    <rect x="720" y="160" width="64" height="44" rx="8" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.2"/>
    <text x="752" y="187">/tmp</text>

    <rect x="790" y="160" width="64" height="44" rx="8" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.2"/>
    <text x="822" y="187">/usr</text>

    <rect x="860" y="160" width="64" height="44" rx="8" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.2"/>
    <text x="892" y="187">/var</text>
  </g>
</svg>
