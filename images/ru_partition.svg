<svg viewBox="0 0 720 380" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif">
  <rect width="720" height="380" fill="#FFFFFF"/>

  <text x="360" y="40" font-size="22" font-weight="700" fill="#1A2B3C" text-anchor="middle">Типы разделов в MBR<tspan fill="#9AA3AD" font-weight="400" font-size="14">   ·   основной, расширенный, логический</tspan></text>

  <!-- Левый диск: 4 основных -->
  <text x="160" y="80" font-size="13" fill="#5A6B7B" text-anchor="middle">Физический диск</text>

  <rect x="60" y="100" width="200" height="240" rx="10" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.5"/>

  <rect x="76" y="116" width="168" height="48" rx="6" fill="#ECF6F4" stroke="#2E9E8F" stroke-width="1.2"/>
  <text x="160" y="145" font-size="12" fill="#1A2B3C" text-anchor="middle">Основной раздел 1</text>

  <rect x="76" y="172" width="168" height="48" rx="6" fill="#ECF6F4" stroke="#2E9E8F" stroke-width="1.2"/>
  <text x="160" y="201" font-size="12" fill="#1A2B3C" text-anchor="middle">Основной раздел 2</text>

  <rect x="76" y="228" width="168" height="48" rx="6" fill="#ECF6F4" stroke="#2E9E8F" stroke-width="1.2"/>
  <text x="160" y="257" font-size="12" fill="#1A2B3C" text-anchor="middle">Основной раздел 3</text>

  <rect x="76" y="284" width="168" height="48" rx="6" fill="#ECF6F4" stroke="#2E9E8F" stroke-width="1.2"/>
  <text x="160" y="313" font-size="12" fill="#1A2B3C" text-anchor="middle">Основной раздел 4</text>

  <!-- Правый диск: 3 основных + расширенный/логические -->
  <text x="560" y="80" font-size="13" fill="#5A6B7B" text-anchor="middle">Физический диск</text>

  <rect x="460" y="100" width="200" height="240" rx="10" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.5"/>

  <rect x="476" y="116" width="168" height="44" rx="6" fill="#ECF6F4" stroke="#2E9E8F" stroke-width="1.2"/>
  <text x="560" y="143" font-size="12" fill="#1A2B3C" text-anchor="middle">Основной раздел 1</text>

  <rect x="476" y="168" width="168" height="44" rx="6" fill="#ECF6F4" stroke="#2E9E8F" stroke-width="1.2"/>
  <text x="560" y="195" font-size="12" fill="#1A2B3C" text-anchor="middle">Основной раздел 2</text>

  <rect x="476" y="220" width="168" height="44" rx="6" fill="#ECF6F4" stroke="#2E9E8F" stroke-width="1.2"/>
  <text x="560" y="247" font-size="12" fill="#1A2B3C" text-anchor="middle">Основной раздел 3</text>

  <!-- Расширенный (пунктирный контейнер) -->
  <rect x="476" y="272" width="168" height="56" rx="6" fill="#FFFFFF" stroke="#5A6B7B" stroke-width="1.3" stroke-dasharray="5 3"/>
  <text x="560" y="288" font-size="11" font-weight="bold" fill="#5A6B7B" text-anchor="middle">Расширенный раздел</text>

  <!-- Логические разделы внутри расширенного -->
  <g>
    <rect x="486" y="296" width="34" height="24" rx="3" fill="#FFFFFF" stroke="#2E9E8F" stroke-width="1.2"/>
    <text x="503" y="312" font-size="10" fill="#1A2B3C" text-anchor="middle">L1</text>
    <rect x="528" y="296" width="34" height="24" rx="3" fill="#FFFFFF" stroke="#2E9E8F" stroke-width="1.2"/>
    <text x="545" y="312" font-size="10" fill="#1A2B3C" text-anchor="middle">L2</text>
    <rect x="570" y="296" width="34" height="24" rx="3" fill="#FFFFFF" stroke="#2E9E8F" stroke-width="1.2"/>
    <text x="587" y="312" font-size="10" fill="#1A2B3C" text-anchor="middle">L3</text>
    <rect x="612" y="296" width="22" height="24" rx="3" fill="#FFFFFF" stroke="#2E9E8F" stroke-width="1.2"/>
    <text x="623" y="312" font-size="10" fill="#1A2B3C" text-anchor="middle">L4</text>
  </g>

  <!-- Подпись логических разделов -->
  <text x="360" y="360" font-size="12" fill="#5A6B7B" text-anchor="middle">L1…L4 — логические разделы внутри расширенного (контейнера)</text>
</svg>
