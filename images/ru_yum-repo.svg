<svg viewBox="0 0 580 520" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif">
  <rect width="580" height="520" fill="#FFFFFF"/>
  <defs>
    <marker id="yumA" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#5A6B7B"/></marker>
  </defs>

  <text x="290" y="40" font-size="22" font-weight="700" fill="#1A2B3C" text-anchor="middle">YUM<tspan fill="#9AA3AD" font-weight="400" font-size="14">   ·   от репозитория к машине</tspan></text>

  <!-- Уровень 1: репозиторий -->
  <rect x="160" y="80" width="260" height="120" rx="12" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.5"/>
  <text x="290" y="112" font-size="15" font-weight="bold" fill="#1A2B3C" text-anchor="middle">Репозиторий ПО</text>
  <rect x="180" y="124" width="220" height="22" rx="4" fill="#F8F9FA"/>
  <text x="290" y="140" font-size="11" font-family="DejaVu Sans Mono, Consolas, monospace" fill="#1A2B3C" text-anchor="middle">/etc/yum.repos.d/redhat.repo</text>
  <rect x="180" y="150" width="220" height="22" rx="4" fill="#F8F9FA"/>
  <text x="290" y="166" font-size="11" font-family="DejaVu Sans Mono, Consolas, monospace" fill="#1A2B3C" text-anchor="middle">/etc/yum.repos.d/nginx.repo</text>
  <text x="290" y="190" font-size="11" fill="#9AA3AD" text-anchor="middle">несколько .repo-файлов</text>

  <line x1="290" y1="206" x2="290" y2="238" stroke="#5A6B7B" stroke-width="1.8" marker-end="url(#yumA)"/>
  <text x="305" y="226" font-size="11" fill="#9AA3AD">локально или по HTTP/HTTPS/FTP</text>

  <!-- Уровень 2: YUM -->
  <rect x="160" y="244" width="260" height="80" rx="12" fill="#ECF6F4" stroke="#2E9E8F" stroke-width="1.5"/>
  <text x="290" y="276" font-size="15" font-weight="bold" fill="#1A2B3C" text-anchor="middle">YUM</text>
  <text x="290" y="298" font-size="12" fill="#5A6B7B" text-anchor="middle">высокоуровневый менеджер</text>

  <line x1="290" y1="330" x2="290" y2="362" stroke="#5A6B7B" stroke-width="1.8" marker-end="url(#yumA)"/>

  <!-- Уровень 3: RPM -->
  <rect x="160" y="368" width="260" height="80" rx="12" fill="#ECF6F4" stroke="#2E9E8F" stroke-width="1.5"/>
  <text x="290" y="400" font-size="15" font-weight="bold" fill="#1A2B3C" text-anchor="middle">RPM</text>
  <text x="290" y="422" font-size="12" fill="#5A6B7B" text-anchor="middle">низкоуровневый менеджер</text>

  <line x1="290" y1="454" x2="290" y2="476" stroke="#5A6B7B" stroke-width="1.8" marker-end="url(#yumA)"/>

  <!-- Уровень 4: машина -->
  <rect x="160" y="482" width="260" height="32" rx="10" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.5"/>
  <text x="290" y="503" font-size="14" font-weight="bold" fill="#1A2B3C" text-anchor="middle">Linux-машина</text>
</svg>
