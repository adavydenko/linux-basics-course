<svg viewBox="0 0 720 260" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif">
  <rect width="720" height="260" fill="#FFFFFF"/>

  <text x="360" y="40" font-size="22" font-weight="700" fill="#1A2B3C" text-anchor="middle">Коммутация<tspan fill="#9AA3AD" font-weight="400" font-size="14">   ·   связь внутри одной сети</tspan></text>

  <!-- Компьютер A -->
  <rect x="40" y="100" width="200" height="100" rx="12" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.5"/>
  <circle cx="140" cy="140" r="22" fill="#ECF6F4"/>
  <g transform="translate(128,128)" stroke="#2E9E8F" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="5" width="18" height="12" rx="1"/>
    <line x1="10" y1="17" x2="14" y2="17"/>
    <line x1="8" y1="20" x2="16" y2="20"/>
  </g>
  <text x="140" y="180" font-size="14" font-weight="bold" fill="#1A2B3C" text-anchor="middle">A</text>
  <text x="140" y="196" font-size="11" fill="#5A6B7B" text-anchor="middle" font-family="DejaVu Sans Mono, Consolas, monospace">192.168.1.10</text>

  <!-- Коммутатор -->
  <rect x="290" y="120" width="140" height="60" rx="12" fill="#2E9E8F"/>
  <text x="360" y="148" font-size="15" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Коммутатор</text>
  <text x="360" y="166" font-size="11" fill="#FFFFFF" text-anchor="middle" font-family="DejaVu Sans Mono, Consolas, monospace">192.168.1.0/24</text>

  <!-- Компьютер B -->
  <rect x="480" y="100" width="200" height="100" rx="12" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.5"/>
  <circle cx="580" cy="140" r="22" fill="#ECF6F4"/>
  <g transform="translate(568,128)" stroke="#2E9E8F" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="5" width="18" height="12" rx="1"/>
    <line x1="10" y1="17" x2="14" y2="17"/>
    <line x1="8" y1="20" x2="16" y2="20"/>
  </g>
  <text x="580" y="180" font-size="14" font-weight="bold" fill="#1A2B3C" text-anchor="middle">B</text>
  <text x="580" y="196" font-size="11" fill="#5A6B7B" text-anchor="middle" font-family="DejaVu Sans Mono, Consolas, monospace">192.168.1.11</text>

  <!-- Связи -->
  <g stroke="#8A97A3" stroke-width="1.8" fill="none">
    <line x1="244" y1="150" x2="286" y2="150"/>
    <line x1="434" y1="150" x2="476" y2="150"/>
  </g>
</svg>
