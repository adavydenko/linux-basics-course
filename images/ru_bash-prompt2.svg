<svg viewBox="0 0 600 290" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif">
  <rect width="600" height="290" fill="#FFFFFF"/>

  <text x="40" y="46" font-size="22" font-weight="700" fill="#1A2B3C">Переменная PS1<tspan fill="#9AA3AD" font-weight="400" font-size="14">   ·   из чего состоит приглашение</tspan></text>

  <!-- Терминальный блок: две строки -->
  <rect x="180" y="90" width="240" height="100" rx="8" fill="#1E2A35"/>

  <!-- Строка 1: команда -->
  <text x="195" y="125" font-family="DejaVu Sans Mono, Consolas, monospace" font-size="20" fill="#9FF59A">[~]$ echo $PS1</text>

  <!-- Строка 2: результат — символы выровнены по координатам, чтобы выноски попали точно -->
  <g font-family="DejaVu Sans Mono, Consolas, monospace" font-size="26" fill="#9FF59A" text-anchor="middle">
    <text x="210" y="170">[</text>
    <text x="226" y="170">\</text>
    <text x="242" y="170">W</text>
    <text x="258" y="170">]</text>
    <text x="276" y="170">$</text>
  </g>

  <!-- Соединительные линии -->
  <g stroke="#8A97A3" stroke-width="1.5" fill="none" stroke-linecap="round">
    <path d="M234,200 V218 H160 V238"/>
    <path d="M276,200 V218 H440 V238"/>
  </g>

  <!-- Подписи -->
  <g font-size="13">
    <text x="160" y="253" text-anchor="middle"><tspan font-weight="bold" fill="#1A2B3C">\W</tspan><tspan fill="#5A6B7B"> — текущий рабочий каталог</tspan></text>
    <text x="440" y="253" text-anchor="middle"><tspan font-weight="bold" fill="#1A2B3C">$</tspan><tspan fill="#5A6B7B"> — приглашение</tspan></text>
  </g>
</svg>
