<svg viewBox="0 0 760 320" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif">
  <rect width="760" height="320" fill="#FFFFFF"/>

  <!-- Заголовок -->
  <text x="40" y="46" font-size="22" font-weight="700" fill="#1A2B3C">Путь к каталогу<tspan fill="#9AA3AD" font-weight="400" font-size="14">   ·   абсолютный и относительный</tspan></text>

  <!-- Левая часть: дерево -->
  <text x="180" y="100" font-size="13" font-weight="bold" fill="#2E9E8F" text-anchor="middle">Где вы находитесь</text>

  <rect x="120" y="115" width="120" height="32" rx="8" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.5"/>
  <text x="180" y="136" font-size="14" font-family="DejaVu Sans Mono, Consolas, monospace" fill="#1A2B3C" text-anchor="middle">/</text>

  <rect x="120" y="170" width="120" height="32" rx="8" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.5"/>
  <text x="180" y="191" font-size="14" font-family="DejaVu Sans Mono, Consolas, monospace" fill="#1A2B3C" text-anchor="middle">home</text>

  <rect x="120" y="225" width="120" height="32" rx="8" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.5"/>
  <text x="180" y="246" font-size="14" font-family="DejaVu Sans Mono, Consolas, monospace" fill="#1A2B3C" text-anchor="middle">michael</text>

  <rect x="120" y="280" width="120" height="32" rx="8" fill="#ECF6F4" stroke="#2E9E8F" stroke-width="1.5"/>
  <text x="180" y="301" font-size="14" font-family="DejaVu Sans Mono, Consolas, monospace" font-weight="bold" fill="#1A2B3C" text-anchor="middle">Asia</text>

  <!-- Связи между узлами дерева -->
  <g stroke="#8A97A3" stroke-width="1.5" stroke-dasharray="4 3">
    <line x1="180" y1="147" x2="180" y2="170"/>
    <line x1="180" y1="202" x2="180" y2="225"/>
    <line x1="180" y1="257" x2="180" y2="280"/>
  </g>

  <!-- Правая часть: два способа попасть в Asia -->
  <text x="520" y="100" font-size="13" font-weight="bold" fill="#2E9E8F" text-anchor="middle">Два способа попасть в Asia</text>

  <!-- Абсолютный путь -->
  <rect x="320" y="115" width="400" height="78" rx="10" fill="#FFFFFF" stroke="#E4E7EB" stroke-width="1.5"/>
  <text x="340" y="138" font-size="13" font-weight="bold" fill="#1A2B3C">Абсолютный путь</text>
  <text x="340" y="155" font-size="11" fill="#5A6B7B">от корня файловой системы</text>
  <rect x="340" y="165" width="360" height="22" rx="4" fill="#F8F9FA"/>
  <text x="350" y="181" font-size="13" font-family="DejaVu Sans Mono, Consolas, monospace" fill="#1A2B3C">$ cd /home/michael/Asia</text>

  <!-- Относительный путь -->
  <rect x="320" y="210" width="400" height="78" rx="10" fill="#FFFFFF" stroke="#E4E7EB" stroke-width="1.5"/>
  <text x="340" y="233" font-size="13" font-weight="bold" fill="#1A2B3C">Относительный путь</text>
  <text x="340" y="250" font-size="11" fill="#5A6B7B">от текущего каталога (<tspan font-family="DejaVu Sans Mono, Consolas, monospace">/home/michael</tspan>)</text>
  <rect x="340" y="260" width="360" height="22" rx="4" fill="#F8F9FA"/>
  <text x="350" y="276" font-size="13" font-family="DejaVu Sans Mono, Consolas, monospace" fill="#1A2B3C">$ cd Asia</text>
</svg>
