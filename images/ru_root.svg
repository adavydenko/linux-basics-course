<svg viewBox="0 0 760 340" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif">
  <rect width="760" height="340" fill="#FFFFFF"/>

  <text x="40" y="40" font-size="22" font-weight="700" fill="#1A2B3C">Иерархия доменных имён<tspan fill="#9AA3AD" font-weight="400" font-size="14">   ·   на примере <tspan font-family="DejaVu Sans Mono, Consolas, monospace">www.google.com</tspan></tspan></text>

  <!-- Подписи уровней слева -->
  <g font-size="13" fill="#5A6B7B">
    <text x="30" y="106">Корень</text>
    <text x="30" y="166">Домен верхнего уровня</text>
    <text x="30" y="226">Домен</text>
    <text x="30" y="286">Поддомены</text>
  </g>

  <!-- Уровень 1: корень "." -->
  <rect x="420" y="80" width="80" height="44" rx="10" fill="#2E9E8F"/>
  <text x="460" y="108" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">.</text>

  <!-- Уровень 2: .com -->
  <rect x="420" y="140" width="80" height="44" rx="10" fill="#ECF6F4" stroke="#2E9E8F" stroke-width="1.5"/>
  <text x="460" y="168" font-size="14" font-weight="bold" fill="#1A2B3C" text-anchor="middle" font-family="DejaVu Sans Mono, Consolas, monospace">.com</text>

  <!-- Уровень 3: google -->
  <rect x="420" y="200" width="80" height="44" rx="10" fill="#ECF6F4" stroke="#2E9E8F" stroke-width="1.5"/>
  <text x="460" y="228" font-size="14" font-weight="bold" fill="#1A2B3C" text-anchor="middle" font-family="DejaVu Sans Mono, Consolas, monospace">google</text>

  <!-- Уровень 4: поддомены -->
  <g font-family="DejaVu Sans Mono, Consolas, monospace" font-size="13" font-weight="bold" fill="#1A2B3C" text-anchor="middle">
    <rect x="160" y="270" width="80" height="44" rx="10" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.2"/>
    <text x="200" y="297">mail</text>

    <rect x="280" y="270" width="80" height="44" rx="10" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.2"/>
    <text x="320" y="297">drive</text>

    <rect x="400" y="270" width="80" height="44" rx="10" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.2"/>
    <text x="440" y="297">www</text>

    <rect x="520" y="270" width="80" height="44" rx="10" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.2"/>
    <text x="560" y="297">maps</text>

    <rect x="640" y="270" width="80" height="44" rx="10" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.2"/>
    <text x="680" y="297">apps</text>
  </g>

  <!-- Связи -->
  <g stroke="#8A97A3" stroke-width="1.5" stroke-dasharray="4 3" fill="none">
    <line x1="460" y1="124" x2="460" y2="140"/>
    <line x1="460" y1="184" x2="460" y2="200"/>
    <line x1="460" y1="244" x2="460" y2="258"/>
    <line x1="200" y1="258" x2="680" y2="258"/>
    <line x1="200" y1="258" x2="200" y2="270"/>
    <line x1="320" y1="258" x2="320" y2="270"/>
    <line x1="440" y1="258" x2="440" y2="270"/>
    <line x1="560" y1="258" x2="560" y2="270"/>
    <line x1="680" y1="258" x2="680" y2="270"/>
  </g>
</svg>
