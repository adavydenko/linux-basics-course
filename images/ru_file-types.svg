<svg viewBox="0 0 740 400" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif">
  <rect width="740" height="400" fill="#FFFFFF"/>

  <!-- Заголовок -->
  <text x="40" y="48" font-size="24" font-weight="700" fill="#1A2B3C">Типы файлов<tspan fill="#9AA3AD" font-weight="400" font-size="14">   ·   в Linux</tspan></text>

  <!-- Блок 1: Обычный файл -->
  <rect x="40" y="120" width="270" height="70" rx="12" fill="#FFFFFF" stroke="#2E9E8F" stroke-width="1.5"/>
  <circle cx="78" cy="155" r="22" fill="#ECF6F4"/>
  <g transform="translate(66,143)" stroke="#2E9E8F" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M6 3 H14 L18 7 V21 H6 Z"/>
    <path d="M14 3 V7 H18"/>
    <line x1="9" y1="12" x2="15" y2="12"/>
    <line x1="9" y1="15" x2="15" y2="15"/>
    <line x1="9" y1="18" x2="13" y2="18"/>
  </g>
  <text x="115" y="161" font-size="16" font-weight="bold" fill="#1A2B3C">Обычный файл</text>

  <!-- Блок 2: Каталог -->
  <rect x="40" y="210" width="270" height="70" rx="12" fill="#FFFFFF" stroke="#2E9E8F" stroke-width="1.5"/>
  <circle cx="78" cy="245" r="22" fill="#ECF6F4"/>
  <g transform="translate(66,233)" stroke="#2E9E8F" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3,7 V18 H21 V9 H12 L10,7 Z"/>
  </g>
  <text x="115" y="251" font-size="16" font-weight="bold" fill="#1A2B3C">Каталог</text>

  <!-- Блок 3: Специальные файлы -->
  <rect x="40" y="300" width="270" height="70" rx="12" fill="#FFFFFF" stroke="#2E9E8F" stroke-width="1.5"/>
  <circle cx="78" cy="335" r="22" fill="#ECF6F4"/>
  <g transform="translate(66,323)" stroke="#2E9E8F" stroke-width="1.7" fill="none" stroke-linecap="round">
    <rect x="6" y="6" width="12" height="12" rx="1.5"/>
    <line x1="9" y1="6" x2="9" y2="3"/><line x1="15" y1="6" x2="15" y2="3"/>
    <line x1="9" y1="18" x2="9" y2="21"/><line x1="15" y1="18" x2="15" y2="21"/>
    <line x1="6" y1="9" x2="3" y2="9"/><line x1="6" y1="15" x2="3" y2="15"/>
    <line x1="18" y1="9" x2="21" y2="9"/><line x1="18" y1="15" x2="21" y2="15"/>
  </g>
  <text x="115" y="341" font-size="16" font-weight="bold" fill="#1A2B3C">Специальные файлы</text>

  <!-- Пунктирные соединители к выноскам -->
  <g stroke="#8A97A3" stroke-width="1.5" stroke-dasharray="4 3">
    <line x1="310" y1="155" x2="380" y2="155"/>
    <line x1="310" y1="245" x2="380" y2="245"/>
    <line x1="310" y1="335" x2="380" y2="335"/>
  </g>

  <!-- Выноска 1: примеры обычных файлов -->
  <rect x="380" y="120" width="320" height="70" rx="10" fill="#F8F9FA" stroke="#E4E7EB" stroke-width="1.5"/>
  <g fill="#2E9E8F"><circle cx="400" cy="138" r="2.5"/><circle cx="400" cy="158" r="2.5"/><circle cx="400" cy="178" r="2.5"/></g>
  <text x="412" y="142" font-size="14" fill="#1A2B3C">Изображения</text>
  <text x="412" y="162" font-size="14" fill="#1A2B3C">Скрипты</text>
  <text x="412" y="182" font-size="14" fill="#1A2B3C">Конфигурация и данные</text>

  <!-- Выноска 2: примеры каталогов -->
  <rect x="380" y="210" width="320" height="70" rx="10" fill="#F8F9FA" stroke="#E4E7EB" stroke-width="1.5"/>
  <g fill="#2E9E8F"><circle cx="400" cy="228" r="2.5"/><circle cx="400" cy="248" r="2.5"/><circle cx="400" cy="268" r="2.5"/></g>
  <text x="412" y="232" font-size="14" fill="#1A2B3C" font-family="DejaVu Sans Mono, Consolas, monospace">/home/bob</text>
  <text x="412" y="252" font-size="14" fill="#1A2B3C" font-family="DejaVu Sans Mono, Consolas, monospace">/root</text>
  <text x="412" y="272" font-size="14" fill="#1A2B3C" font-family="DejaVu Sans Mono, Consolas, monospace">/home/bob/code-directory</text>

  <!-- Выноска 3: подвиды специальных файлов -->
  <rect x="380" y="300" width="320" height="70" rx="10" fill="#F8F9FA" stroke="#E4E7EB" stroke-width="1.5"/>
  <g fill="#2E9E8F"><circle cx="400" cy="318" r="2.5"/><circle cx="400" cy="338" r="2.5"/><circle cx="400" cy="358" r="2.5"/></g>
  <text x="412" y="322" font-size="14" fill="#1A2B3C">Символьные устройства</text>
  <text x="412" y="342" font-size="14" fill="#1A2B3C">Блочные устройства</text>
  <text x="412" y="362" font-size="14" fill="#1A2B3C">Ссылки, сокеты, каналы</text>
</svg>
