<svg viewBox="0 0 800 330" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif">
  <rect width="800" height="330" fill="#FFFFFF"/>
  <defs>
    <marker id="us1A" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#2E9E8F"/></marker>
    <marker id="us1B" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#8A97A3"/></marker>
  </defs>

  <text x="400" y="46" font-size="22" font-weight="700" fill="#1A2B3C" text-anchor="middle">Системный вызов на примере<tspan fill="#9AA3AD" font-weight="400" font-size="14">   ·   <tspan font-family="DejaVu Sans Mono, Consolas, monospace">cat /etc/os-release</tspan></tspan></text>

  <!-- Регион: оборудование -->
  <rect x="30" y="110" width="170" height="180" rx="16" fill="#ECF6F4" stroke="#2E9E8F" stroke-width="2" stroke-dasharray="8 4"/>
  <text x="115" y="138" font-size="15" font-weight="bold" fill="#1A2B3C" text-anchor="middle">Оборудование</text>

  <rect x="50" y="158" width="130" height="34" rx="8" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.2"/>
  <text x="115" y="180" font-size="13" font-weight="bold" fill="#1A2B3C" text-anchor="middle">Память</text>

  <rect x="50" y="200" width="130" height="34" rx="8" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.2"/>
  <text x="115" y="222" font-size="13" font-weight="bold" fill="#1A2B3C" text-anchor="middle">CPU</text>

  <rect x="50" y="242" width="130" height="34" rx="8" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.2"/>
  <text x="115" y="264" font-size="13" font-weight="bold" fill="#1A2B3C" text-anchor="middle">Диск</text>

  <!-- Регион: пространство ядра -->
  <rect x="280" y="110" width="240" height="180" rx="16" fill="#ECF6F4" stroke="#2E9E8F" stroke-width="2" stroke-dasharray="8 4"/>
  <text x="400" y="138" font-size="15" font-weight="bold" fill="#1A2B3C" text-anchor="middle">Пространство ядра</text>

  <rect x="300" y="160" width="200" height="50" rx="10" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.2"/>
  <text x="400" y="190" font-size="15" font-weight="bold" fill="#1A2B3C" text-anchor="middle">Ядро</text>

  <rect x="300" y="222" width="200" height="50" rx="10" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.2"/>
  <text x="400" y="252" font-size="14" font-weight="bold" fill="#1A2B3C" text-anchor="middle">Драйверы устройств</text>

  <!-- Регион: пространство пользователя -->
  <rect x="600" y="110" width="170" height="180" rx="16" fill="#ECF6F4" stroke="#2E9E8F" stroke-width="2" stroke-dasharray="8 4"/>
  <text x="685" y="138" font-size="15" font-weight="bold" fill="#1A2B3C" text-anchor="middle">Пространство пользователя</text>

  <rect x="620" y="170" width="130" height="100" rx="10" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.2"/>
  <text x="685" y="200" font-size="14" font-weight="bold" fill="#1A2B3C" text-anchor="middle">Процесс A</text>
  <rect x="630" y="218" width="110" height="22" rx="4" fill="#F8F9FA"/>
  <text x="685" y="234" font-size="11" font-family="DejaVu Sans Mono, Consolas, monospace" fill="#1A2B3C" text-anchor="middle">cat /etc/os-release</text>

  <!-- Связь оборудование ← ядро (драйверы читают диск) -->
  <text x="240" y="192" font-size="12" fill="#5A6B7B" text-anchor="middle">читает диск</text>
  <line x1="276" y1="206" x2="204" y2="206" stroke="#8A97A3" stroke-width="1.8" stroke-dasharray="5 3" marker-end="url(#us1B)"/>

  <!-- Связь пользователь → ядро (конкретный вызов open()) -->
  <text x="560" y="192" font-size="13" font-weight="bold" fill="#2E9E8F" text-anchor="middle" font-family="DejaVu Sans Mono, Consolas, monospace">open()</text>
  <line x1="596" y1="206" x2="524" y2="206" stroke="#2E9E8F" stroke-width="2.5" marker-end="url(#us1A)"/>
</svg>
