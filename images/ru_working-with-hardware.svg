<svg viewBox="0 0 800 260" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif">
  <rect width="800" height="260" fill="#FFFFFF"/>
  <defs>
    <marker id="whA" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#5A6B7B"/></marker>
  </defs>

  <text x="40" y="46" font-size="22" font-weight="700" fill="#1A2B3C">Работа с оборудованием<tspan fill="#9AA3AD" font-weight="400" font-size="14">   ·   от USB до /dev/sdb1</tspan></text>

  <!-- 4 карточки: USB → драйвер → udev → /dev/sdb1 -->
  <rect x="30" y="120" width="140" height="80" rx="12" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.5"/>
  <text x="100" y="153" font-size="14" font-weight="bold" fill="#1A2B3C" text-anchor="middle">USB-устройство</text>
  <text x="100" y="178" font-size="11" fill="#9AA3AD" text-anchor="middle">подключено</text>

  <rect x="214" y="120" width="140" height="80" rx="12" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.5"/>
  <text x="284" y="153" font-size="14" font-weight="bold" fill="#1A2B3C" text-anchor="middle">Драйвер устройства</text>
  <text x="284" y="178" font-size="11" fill="#9AA3AD" text-anchor="middle">пространство ядра</text>

  <rect x="398" y="120" width="140" height="80" rx="12" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.5"/>
  <text x="468" y="153" font-size="14" font-weight="bold" fill="#1A2B3C" text-anchor="middle">udev</text>
  <text x="468" y="178" font-size="11" fill="#9AA3AD" text-anchor="middle">пространство пользователя</text>

  <rect x="582" y="120" width="140" height="80" rx="12" fill="#ECF6F4" stroke="#2E9E8F" stroke-width="1.5"/>
  <text x="652" y="156" font-size="14" font-weight="bold" fill="#1A2B3C" text-anchor="middle" font-family="DejaVu Sans Mono, Consolas, monospace">/dev/sdb1</text>
  <text x="652" y="178" font-size="11" fill="#5A6B7B" text-anchor="middle">файл устройства</text>

  <!-- Стрелки между карточками -->
  <line x1="176" y1="160" x2="208" y2="160" stroke="#5A6B7B" stroke-width="1.8" marker-end="url(#whA)"/>

  <text x="376" y="146" font-size="11" font-weight="bold" fill="#2E9E8F" text-anchor="middle">uevents</text>
  <line x1="360" y1="160" x2="392" y2="160" stroke="#5A6B7B" stroke-width="1.8" marker-end="url(#whA)"/>

  <text x="560" y="146" font-size="11" font-style="italic" fill="#5A6B7B" text-anchor="middle">создаёт</text>
  <line x1="544" y1="160" x2="576" y2="160" stroke="#5A6B7B" stroke-width="1.8" marker-end="url(#whA)"/>
</svg>
