<svg viewBox="0 0 600 320" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif">
  <rect width="600" height="320" fill="#FFFFFF"/>
  <defs>
    <marker id="lkA" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5A6B7B"/></marker>
  </defs>

  <text x="300" y="46" font-size="22" font-weight="700" fill="#1A2B3C" text-anchor="middle">Ядро Linux<tspan fill="#9AA3AD" font-weight="400" font-size="14">   ·   между программами и оборудованием</tspan></text>

  <!-- Верхний слой: приложения -->
  <rect x="140" y="80" width="320" height="46" rx="10" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.5"/>
  <text x="300" y="108" font-size="15" font-weight="bold" fill="#1A2B3C" text-anchor="middle">Приложения и процессы</text>

  <!-- Стрелка приложения ↔ ядро -->
  <line x1="300" y1="130" x2="300" y2="156" stroke="#5A6B7B" stroke-width="1.5" marker-start="url(#lkA)" marker-end="url(#lkA)"/>

  <!-- Средний слой: ядро (акцент) -->
  <rect x="140" y="158" width="320" height="56" rx="10" fill="#2E9E8F"/>
  <text x="300" y="194" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Ядро Linux</text>

  <!-- Стрелки ядро ↔ оборудование -->
  <line x1="192" y1="218" x2="192" y2="246" stroke="#5A6B7B" stroke-width="1.5" marker-start="url(#lkA)" marker-end="url(#lkA)"/>
  <line x1="300" y1="218" x2="300" y2="246" stroke="#5A6B7B" stroke-width="1.5" marker-start="url(#lkA)" marker-end="url(#lkA)"/>
  <line x1="408" y1="218" x2="408" y2="246" stroke="#5A6B7B" stroke-width="1.5" marker-start="url(#lkA)" marker-end="url(#lkA)"/>

  <!-- Нижний слой: оборудование -->
  <rect x="144" y="248" width="96" height="46" rx="10" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.5"/>
  <text x="192" y="276" font-size="14" font-weight="bold" fill="#1A2B3C" text-anchor="middle">Память</text>

  <rect x="252" y="248" width="96" height="46" rx="10" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.5"/>
  <text x="300" y="276" font-size="14" font-weight="bold" fill="#1A2B3C" text-anchor="middle">CPU</text>

  <rect x="360" y="248" width="96" height="46" rx="10" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.5"/>
  <text x="408" y="276" font-size="14" font-weight="bold" fill="#1A2B3C" text-anchor="middle">Устройства</text>
</svg>
