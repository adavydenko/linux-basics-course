<svg viewBox="0 0 720 240" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif">
  <rect width="720" height="240" fill="#FFFFFF"/>
  <defs>
    <marker id="pkA" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#5A6B7B"/></marker>
  </defs>

  <text x="40" y="40" font-size="22" font-weight="700" fill="#1A2B3C">Что внутри пакета<tspan fill="#9AA3AD" font-weight="400" font-size="14">   ·   три обязательные части</tspan></text>

  <!-- Левая карточка: пакет -->
  <rect x="40" y="90" width="220" height="100" rx="12" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.5"/>
  <circle cx="150" cy="130" r="24" fill="#ECF6F4"/>
  <g transform="translate(138,118)" stroke="#2E9E8F" stroke-width="1.7" fill="none" stroke-linejoin="round">
    <path d="M3,7 L12,3 L21,7 V17 L12,21 L3,17 Z"/>
    <path d="M3,7 L12,11 L21,7"/>
    <path d="M12,11 V21"/>
  </g>
  <text x="150" y="170" font-size="14" font-weight="bold" fill="#1A2B3C" text-anchor="middle">Пакет ПО</text>
  <text x="150" y="187" font-size="11" font-family="DejaVu Sans Mono, Consolas, monospace" fill="#9AA3AD" text-anchor="middle">gimp.deb</text>

  <!-- Стрелка → -->
  <line x1="266" y1="140" x2="298" y2="140" stroke="#5A6B7B" stroke-width="1.8" marker-end="url(#pkA)"/>

  <!-- Правый регион: содержимое -->
  <rect x="310" y="80" width="380" height="140" rx="16" fill="#ECF6F4" stroke="#2E9E8F" stroke-width="2" stroke-dasharray="8 4"/>
  <text x="500" y="103" font-size="13" font-weight="bold" fill="#1A2B3C" text-anchor="middle">содержит</text>

  <rect x="330" y="115" width="340" height="30" rx="8" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.2"/>
  <text x="500" y="135" font-size="13" font-weight="bold" fill="#1A2B3C" text-anchor="middle">Исполняемые файлы (binaries)</text>

  <rect x="330" y="150" width="340" height="30" rx="8" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.2"/>
  <text x="500" y="170" font-size="13" font-weight="bold" fill="#1A2B3C" text-anchor="middle">Метаданные</text>

  <rect x="330" y="185" width="340" height="30" rx="8" fill="#FFFFFF" stroke="#C7D0D8" stroke-width="1.2"/>
  <text x="500" y="205" font-size="13" font-weight="bold" fill="#1A2B3C" text-anchor="middle">Файлы конфигурации</text>
</svg>
