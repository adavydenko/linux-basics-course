<svg viewBox="0 0 720 260" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif">
  <rect width="720" height="260" fill="#FFFFFF"/>

  <text x="40" y="46" font-size="22" font-weight="700" fill="#1A2B3C">Два способа работать с Linux<tspan fill="#9AA3AD" font-weight="400" font-size="14">   ·   графика и оболочка</tspan></text>

  <!-- Графический интерфейс -->
  <rect x="60" y="90" width="280" height="140" rx="14" fill="#FFFFFF" stroke="#E4E7EB" stroke-width="1.5"/>
  <circle cx="200" cy="140" r="26" fill="#ECF6F4"/>
  <g transform="translate(188,128)" stroke="#2E9E8F" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="5" width="18" height="12" rx="1"/>
    <line x1="10" y1="17" x2="14" y2="17"/>
    <line x1="8" y1="20" x2="16" y2="20"/>
  </g>
  <text x="200" y="190" font-size="16" font-weight="bold" fill="#1A2B3C" text-anchor="middle">Графический интерфейс</text>
  <text x="200" y="212" font-size="12" fill="#9AA3AD" text-anchor="middle">Ubuntu Desktop, GNOME, KDE</text>

  <!-- Командная строка -->
  <rect x="380" y="90" width="280" height="140" rx="14" fill="#FFFFFF" stroke="#E4E7EB" stroke-width="1.5"/>
  <circle cx="520" cy="140" r="26" fill="#ECF6F4"/>
  <g transform="translate(508,128)" stroke="#2E9E8F" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="4" width="18" height="16" rx="2"/>
    <polyline points="7,9 11,12 7,15"/>
    <line x1="13" y1="15" x2="17" y2="15"/>
  </g>
  <text x="520" y="190" font-size="16" font-weight="bold" fill="#1A2B3C" text-anchor="middle">Командная строка (shell)</text>
  <text x="520" y="212" font-size="12" font-family="DejaVu Sans Mono, Consolas, monospace" fill="#9AA3AD" text-anchor="middle">bash, zsh, sh</text>
</svg>
